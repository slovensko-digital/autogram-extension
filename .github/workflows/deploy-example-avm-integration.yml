name: Deploy example-avm-integration to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "example-avm-integration/**"
      - "autogram-sdk/**"
      - ".github/workflows/deploy-example-avm-integration.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build autogram-sdk
        run: npm run build
        working-directory: autogram-sdk

      - name: Build example-avm-integration
        run: npx vite build
        working-directory: example-avm-integration

      - name: Prepare Pages artifact structure
        run: |
          mkdir -p .pages/example-avm-integration
          cp -R example-avm-integration/dist/* .pages/example-avm-integration/
          cat > .pages/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=/autogram-extension/example-avm-integration/" />
              <title>Redirecting...</title>
            </head>
            <body>
              Redirecting to <a href="/autogram-extension/example-avm-integration/">example-avm-integration</a>...
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
